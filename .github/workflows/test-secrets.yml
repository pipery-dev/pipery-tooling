name: Test Secrets Access

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify GITLAB_TOKEN accessibility
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "ERROR: GITLAB_TOKEN not accessible"
            exit 1
          fi
          echo "SUCCESS: GITLAB_TOKEN is accessible"
          echo "Token length: ${#GITLAB_TOKEN}"

      - name: Verify BITBUCKET_TOKEN accessibility
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          if [ -z "$BITBUCKET_TOKEN" ]; then
            echo "ERROR: BITBUCKET_TOKEN not accessible"
            exit 1
          fi
          echo "SUCCESS: BITBUCKET_TOKEN is accessible"
          echo "Token length: ${#BITBUCKET_TOKEN}"

      - name: Echo secret names (not values)
        run: |
          echo "Configured secrets:"
          echo "  - GITLAB_TOKEN"
          echo "  - BITBUCKET_TOKEN"
          echo ""
          echo "Secret resolution test:"
          echo "  GITLAB_TOKEN: defined=${{ secrets.GITLAB_TOKEN != '' }}"
          echo "  BITBUCKET_TOKEN: defined=${{ secrets.BITBUCKET_TOKEN != '' }}"
