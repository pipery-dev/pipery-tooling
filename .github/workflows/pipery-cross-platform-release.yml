name: Cross-Platform Release

on:
  workflow_call:
    inputs:
      repo_name:
        description: 'Repository name (bare slug like pipery-npm-ci)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_ID }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t ed25519 bitbucket.org >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install pipery-tooling
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/pipery-dev/pipery-tooling.git

      - name: Configure Git
        run: |
          git config --global user.name "pipery-sync"
          git config --global user.email "sync@pipery.dev"

      - name: Create GitHub release
        continue-on-error: true
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}

          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Release $TAG_NAME already exists"
          else
            gh release create "$TAG_NAME" \
              --title "Release $TAG_NAME" \
              --draft=false \
              --prerelease=false \
              --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to GitLab
        continue-on-error: true
        run: |
          echo "Syncing ${{ inputs.repo_name }} to GitLab..."
          python3 << 'EOFPYTHON'
          from pipery_tooling.cross_platform_sync import PlatformSync

          sync = PlatformSync()
          result = sync.sync_to_platform(
              "${{ inputs.repo_name }}",
              "gitlab",
              "pipery-dev/${{ inputs.repo_name }}"
          )

          if result.get("status") == "success":
              print("✓ GitLab sync successful")
          else:
              print(f"✗ GitLab sync failed: {result.get('error')}")
          EOFPYTHON

      - name: Sync to Bitbucket
        continue-on-error: true
        run: |
          echo "Syncing ${{ inputs.repo_name }} to Bitbucket..."
          python3 << 'EOFPYTHON'
          from pipery_tooling.cross_platform_sync import PlatformSync

          sync = PlatformSync()
          result = sync.sync_to_platform(
              "${{ inputs.repo_name }}",
              "bitbucket",
              "pipery-dev/${{ inputs.repo_name }}"
          )

          if result.get("status") == "success":
              print("✓ Bitbucket sync successful")
          else:
              print(f"✗ Bitbucket sync failed: {result.get('error')}")
          EOFPYTHON

      - name: Release summary
        if: always()
        run: |
          echo "Release Summary"
          echo "=============="
          echo "Repository: ${{ inputs.repo_name }}"
          echo "Tag: ${GITHUB_REF#refs/tags/}"
