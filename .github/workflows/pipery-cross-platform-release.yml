name: Cross-Platform Release

on:
  workflow_call:
    inputs:
      repo_name:
        description: 'Repository name (bare slug like pipery-npm-ci)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_ID }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t ed25519 bitbucket.org >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install pipery-tooling
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/pipery-dev/pipery-tooling.git

      - name: Configure Git
        run: |
          git config --global user.name "pipery-sync"
          git config --global user.email "sync@pipery.dev"

      - name: Capture tagged commit SHA
        id: tag_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          TAGGED_COMMIT=$(git rev-parse HEAD)
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "tagged_commit=${TAGGED_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Create platform release branches
        run: |
          python3 << 'EOFPYTHON'
          from pathlib import Path
          from pipery_tooling.release_branches import create_platform_release_branches

          branches = create_platform_release_branches(
              repo_dir=Path("."),
              tag_name="${{ steps.tag_info.outputs.tag_name }}",
              tagged_commit="${{ steps.tag_info.outputs.tagged_commit }}",
          )
          for platform, branch in branches.items():
              print(f"Created: {branch}")
          EOFPYTHON

      - name: Push release branches to GitHub
        run: |
          TAG="${{ steps.tag_info.outputs.tag_name }}"
          git push origin "release/github-${TAG}" --force
          git push origin "release/gitlab-${TAG}" --force
          git push origin "release/bitbucket-${TAG}" --force

      - name: Create GitHub release
        continue-on-error: true
        run: |
          TAG="${{ steps.tag_info.outputs.tag_name }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --title "Release $TAG" \
              --target "release/github-${TAG}" \
              --draft=false \
              --prerelease=false \
              --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to GitLab
        continue-on-error: true
        run: |
          python3 << 'EOFPYTHON'
          from pipery_tooling.cross_platform_sync import PlatformSync

          sync = PlatformSync()
          result = sync.sync_to_platform(
              "${{ inputs.repo_name }}",
              "gitlab",
              "pipery-dev/${{ inputs.repo_name }}",
              tag_name="${{ steps.tag_info.outputs.tag_name }}",
          )
          if result.get("status") == "success":
              print("GitLab sync successful")
          else:
              print(f"GitLab sync failed: {result.get('error')}")
          EOFPYTHON

      - name: Sync to Bitbucket
        continue-on-error: true
        run: |
          python3 << 'EOFPYTHON'
          from pipery_tooling.cross_platform_sync import PlatformSync

          sync = PlatformSync()
          result = sync.sync_to_platform(
              "${{ inputs.repo_name }}",
              "bitbucket",
              "pipery-dev/${{ inputs.repo_name }}",
              tag_name="${{ steps.tag_info.outputs.tag_name }}",
          )
          if result.get("status") == "success":
              print("Bitbucket sync successful")
          else:
              print(f"Bitbucket sync failed: {result.get('error')}")
          EOFPYTHON

      - name: Create GitLab release
        continue-on-error: true
        run: |
          python3 << 'EOFPYTHON'
          from pipery_tooling.cross_platform_sync import PlatformSync
          import os

          sync = PlatformSync()
          result = sync.create_release(
              "${{ inputs.repo_name }}",
              "${{ steps.tag_info.outputs.tag_name }}",
              "gitlab",
              os.environ.get("GITLAB_TOKEN"),
          )
          if result.get("status") == "success":
              print(f"GitLab release created: ${{ steps.tag_info.outputs.tag_name }}")
          else:
              print(f"GitLab release failed: {result.get('error')}")
          EOFPYTHON
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}

      - name: Release summary
        if: always()
        run: |
          TAG="${{ steps.tag_info.outputs.tag_name }}"
          echo "Release Summary"
          echo "==============="
          echo "Repository: ${{ inputs.repo_name }}"
          echo "Tag:        ${TAG}"
          echo "Branches:   release/github-${TAG}, release/gitlab-${TAG}, release/bitbucket-${TAG}"
